apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: volsync--actual--actual-src
  namespace: finance
spec:
  restic:
    copyMethod: Direct
    moverSecurityContext:
      fsGroup: 101
    pruneIntervalDays: 8
    repository: volsync--actual--actual
    retain:
      daily: 1
      monthly: 1
      weekly: 1
      yearly: 1
  sourcePVC: actual
  trigger:
    schedule: 0 4 * * *
