apiVersion: oathkeeper.ory.sh/v1alpha1
kind: Rule
metadata:
  name: actual
  namespace: finance
spec:
  authenticators:
    - handler: cookie_session
  authorizer:
    handler: allow
  errors:
    - handler: redirect
  match:
    methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
    url: https://actual.trdos.me/<**>
  mutators:
    - handler: header
  upstream:
    url: http://actual.finance.svc.cluster.local:5006
