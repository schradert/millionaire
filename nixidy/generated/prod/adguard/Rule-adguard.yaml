apiVersion: oathkeeper.ory.sh/v1alpha1
kind: Rule
metadata:
  name: adguard
  namespace: kube-system
spec:
  authenticators:
    - handler: cookie_session
  authorizer:
    handler: allow
  errors:
    - handler: redirect
  match:
    methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
    url: https://adguard.trdos.me/<.*>
  mutators:
    - handler: header
  upstream:
    url: http://adguard.kube-system.svc.cluster.local:3000
