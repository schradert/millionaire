apiVersion: v1
data:
  alertmanager.yml: |
    global: {}
    receivers:
    - email_configs:
      - from: noreply@trdos.me
        require_tls: false
        smarthost: stalwart.mail.svc.cluster.local:25
        to: t0rdos@pm.me
      name: email
    route:
      group_interval: 5m
      group_wait: 30s
      receiver: email
      repeat_interval: 4h
    templates:
    - /etc/alertmanager/*.tmpl
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/instance: alertmanager
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: alertmanager
  name: alertmanager
  namespace: observability
