apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-events-sensor
  namespace: cicd
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - workflows
    verbs:
      - create
  - apiGroups:
      - argoproj.io
    resources:
      - workflowtemplates
    verbs:
      - get
