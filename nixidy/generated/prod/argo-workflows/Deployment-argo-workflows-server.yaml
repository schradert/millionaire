apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: server
    app.kubernetes.io/component: server
    app.kubernetes.io/instance: argo-workflows
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: argo-workflows-server
    app.kubernetes.io/part-of: argo-workflows
  name: argo-workflows-server
  namespace: cicd
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/instance: argo-workflows
      app.kubernetes.io/name: argo-workflows-server
  template:
    metadata:
      annotations:
        checksum/cm: 751ce53d21d35e7b20d40f09e31a8a004bd914bc2c18550c9d4a69dd9b3757dc
      labels:
        app: server
        app.kubernetes.io/component: server
        app.kubernetes.io/instance: argo-workflows
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: argo-workflows-server
        app.kubernetes.io/part-of: argo-workflows
    spec:
      containers:
        - args:
            - server
            - --configmap=argo-workflows-workflow-controller-configmap
            - --auth-mode=sso
            - --secure
            - --auth-mode=sso
            - --secure=false
            - --loglevel
            - info
            - --gloglevel
            - "0"
            - --log-format
            - text
          env:
            - name: IN_CLUSTER
              value: "true"
            - name: ARGO_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: ARGO_BASE_HREF
              value: /
          image: quay.io/argoproj/argocli:v4.0.5
          imagePullPolicy: Always
          name: argo-server
          ports:
            - containerPort: 2746
              name: web
          readinessProbe:
            httpGet:
              path: /
              port: 2746
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 20
          resources: {}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
          volumeMounts:
            - mountPath: /tmp
              name: tmp
      nodeSelector:
        kubernetes.io/os: linux
      serviceAccountName: argo-workflows-server
      terminationGracePeriodSeconds: 30
      volumes:
        - emptyDir: {}
          name: tmp
