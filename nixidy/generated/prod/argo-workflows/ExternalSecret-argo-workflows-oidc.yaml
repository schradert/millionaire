apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argo-workflows-oidc
  namespace: cicd
spec:
  data:
    - remoteRef:
        key: argo-workflows
        property: client-id
      secretKey: CLIENT_ID
    - remoteRef:
        key: argo-workflows
        property: client-secret
      secretKey: CLIENT_SECRET
  secretStoreRef:
    kind: ClusterSecretStore
    name: kubernetes-identity
