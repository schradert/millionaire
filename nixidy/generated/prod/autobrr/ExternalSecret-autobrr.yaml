apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: autobrr
  namespace: media
spec:
  data:
    - remoteRef:
        key: autobrr
      secretKey: session_secret.txt
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: bitwarden
    - remoteRef:
        key: autobrr-app
        property: password
      secretKey: db_password.txt
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: kubernetes-media
