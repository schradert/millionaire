apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: volsync--baikal--baikal-src
  namespace: home
spec:
  restic:
    copyMethod: Direct
    moverSecurityContext:
      fsGroup: 101
    pruneIntervalDays: 8
    repository: volsync--baikal--baikal
    retain:
      daily: 1
      monthly: 1
      weekly: 1
      yearly: 1
  sourcePVC: baikal-data
  trigger:
    schedule: 0 4 * * *
