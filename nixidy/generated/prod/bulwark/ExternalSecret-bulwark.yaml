apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bulwark
  namespace: mail
spec:
  data:
    - remoteRef:
        key: bulwark/session-secret
      secretKey: SESSION_SECRET
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: bitwarden
    - remoteRef:
        key: bulwark
        property: client-id
      secretKey: OAUTH_CLIENT_ID
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: kubernetes-identity
    - remoteRef:
        key: bulwark
        property: client-secret
      secretKey: OAUTH_CLIENT_SECRET
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: kubernetes-identity
