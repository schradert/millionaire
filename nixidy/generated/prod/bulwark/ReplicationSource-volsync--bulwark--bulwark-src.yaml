apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: volsync--bulwark--bulwark-src
  namespace: mail
spec:
  restic:
    copyMethod: Direct
    moverSecurityContext:
      fsGroup: 101
    pruneIntervalDays: 8
    repository: volsync--bulwark--bulwark
    retain:
      daily: 1
      monthly: 1
      weekly: 1
      yearly: 1
  sourcePVC: bulwark
  trigger:
    schedule: 0 4 * * *
