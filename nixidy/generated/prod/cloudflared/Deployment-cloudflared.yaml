apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app.kubernetes.io/controller: cloudflared
    app.kubernetes.io/instance: cloudflared
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: cloudflared
  name: cloudflared
  namespace: kube-system
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/controller: cloudflared
      app.kubernetes.io/instance: cloudflared
      app.kubernetes.io/name: cloudflared
  strategy:
    type: RollingUpdate
  template:
    metadata:
      annotations:
        checksum/configMaps: a308d54139db9d18159d837639080a1f7b8ab75ca35a29ef39c99769285363b7
      labels:
        app.kubernetes.io/controller: cloudflared
        app.kubernetes.io/instance: cloudflared
        app.kubernetes.io/name: cloudflared
    spec:
      automountServiceAccountToken: true
      containers:
        - args:
            - tunnel
            - --config
            - /etc/cloudflared/config.yaml
            - run
          image: cloudflare/cloudflared:2026.2.0@sha256:d4d2bf56c792ab207fa557c2431c250bfc8e4114d7e28c98eda1896bf65f10f6
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
          name: cloudflared
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
          startupProbe:
            failureThreshold: 30
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
          volumeMounts:
            - mountPath: /etc/cloudflared/config.yaml
              name: config
              readOnly: true
              subPath: config.yaml
            - mountPath: /etc/cloudflared/token.txt
              name: creds
              readOnly: true
              subPath: token.txt
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      serviceAccountName: default
      volumes:
        - configMap:
            name: cloudflared
          name: config
        - name: creds
          secret:
            secretName: cloudflared
