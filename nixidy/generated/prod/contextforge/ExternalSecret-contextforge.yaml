apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: contextforge
  namespace: ai
spec:
  data:
    - remoteRef:
        key: contextforge-app
        property: password
      secretKey: db_password
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: kubernetes-ai
    - remoteRef:
        key: ai/contextforge/client-secret
      secretKey: oidc_secret
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: bitwarden
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  target:
    template:
      data:
        DB_PASSWORD: '{{ .db_password }}'
        OIDC_CLIENT_SECRET: '{{ .oidc_secret }}'
