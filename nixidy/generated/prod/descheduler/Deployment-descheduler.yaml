apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: descheduler
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: descheduler
  name: descheduler
  namespace: cicd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: descheduler
      app.kubernetes.io/name: descheduler
  template:
    metadata:
      annotations:
        checksum/config: 80441b042d36d645230ab796c21b37354e826eb1c248e43db2cc763dbd20f8ee
      labels:
        app.kubernetes.io/instance: descheduler
        app.kubernetes.io/name: descheduler
    spec:
      containers:
        - args:
            - --policy-config-file=/policy-dir/policy.yaml
            - --descheduling-interval=5m
            - --v=3
            - --leader-elect=true
          command:
            - /bin/descheduler
          image: registry.k8s.io/descheduler/descheduler:v0.35.1
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 10258
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 20
            timeoutSeconds: 5
          name: descheduler
          ports:
            - containerPort: 10258
              protocol: TCP
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - mountPath: /policy-dir
              name: policy-volume
      priorityClassName: system-cluster-critical
      serviceAccountName: descheduler
      volumes:
        - configMap:
            name: descheduler
          name: policy-volume
