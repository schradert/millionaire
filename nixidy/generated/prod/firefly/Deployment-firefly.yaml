apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app.kubernetes.io/controller: firefly
    app.kubernetes.io/instance: firefly
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: firefly
  name: firefly
  namespace: finance
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/controller: firefly
      app.kubernetes.io/instance: firefly
      app.kubernetes.io/name: firefly
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        checksum/configMaps: 2965e9672fabe331d6bf2c908d9e93a23ecf7eb3534ac7813ce68bf3052fa7f9
      labels:
        app.kubernetes.io/controller: firefly
        app.kubernetes.io/instance: firefly
        app.kubernetes.io/name: firefly
    spec:
      automountServiceAccountToken: true
      containers:
        - image: fireflyiii/core:version-6.5.4@sha256:6ae1b92eb73b4ae8a8e7e038440b93fba46267e05b5b903c62316b8cb03779af
          livenessProbe:
            httpGet:
              path: /health
              port: http
          name: firefly
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            timeoutSeconds: 1
          startupProbe:
            failureThreshold: 30
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          volumeMounts:
            - mountPath: /.env
              name: config
              readOnly: true
            - mountPath: /secrets
              name: secrets
            - mountPath: /var/www/html/storage/upload
              name: upload
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      serviceAccountName: default
      volumes:
        - configMap:
            name: firefly
          name: config
        - name: secrets
          secret:
            secretName: firefly
        - name: upload
          persistentVolumeClaim:
            claimName: firefly
