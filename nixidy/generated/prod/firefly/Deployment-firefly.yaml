apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app.kubernetes.io/controller: firefly
    app.kubernetes.io/instance: firefly
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: firefly
  name: firefly
  namespace: finance
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/controller: firefly
      app.kubernetes.io/instance: firefly
      app.kubernetes.io/name: firefly
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        checksum/configMaps: 94dc9a4423c887c052b31cd8f25708b6123e1a14f6defe2f22a18ea6c4bec8f5
      labels:
        app.kubernetes.io/controller: firefly
        app.kubernetes.io/instance: firefly
        app.kubernetes.io/name: firefly
    spec:
      automountServiceAccountToken: true
      containers:
        - env:
            - name: APP_KEY_FILE
              value: /secrets/app_key.txt
            - name: DB_PASSWORD_FILE
              value: /secrets/db_password.txt
          image: fireflyiii/core:version-6.5.4@sha256:6ae1b92eb73b4ae8a8e7e038440b93fba46267e05b5b903c62316b8cb03779af
          livenessProbe:
            httpGet:
              path: /health
              port: http
          name: firefly
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            timeoutSeconds: 1
          startupProbe:
            failureThreshold: 30
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          volumeMounts:
            - mountPath: /var/www/html/.env
              name: config
              readOnly: true
              subPath: .env
            - mountPath: /secrets
              name: secrets
            - mountPath: /var/www/html/storage/upload
              name: upload
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      serviceAccountName: default
      volumes:
        - configMap:
            name: firefly
          name: config
        - name: secrets
          secret:
            secretName: firefly
        - name: upload
          persistentVolumeClaim:
            claimName: firefly
