apiVersion: v1
data:
  config.yml: |-
    cameras:
      back:
        detect:
          fps: 5
          height: 720
          width: 1280
        enabled: true
        ffmpeg:
          inputs:
          - path: rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASS}@{FRIGATE_CAM_BACK_IP}:554/h264Preview_01_main
            roles:
            - record
          - path: rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASS}@{FRIGATE_CAM_BACK_IP}:554/h264Preview_01_sub
            roles:
            - detect
        objects:
          track:
          - person
          - car
          - dog
          - cat
        record:
          enabled: true
          events:
            retain:
              default: 14
          retain:
            days: 7
        snapshots:
          enabled: true
          retain:
            default: 14
      front:
        detect:
          fps: 5
          height: 720
          width: 1280
        enabled: true
        ffmpeg:
          inputs:
          - path: rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASS}@{FRIGATE_CAM_FRONT_IP}:554/h264Preview_01_main
            roles:
            - record
          - path: rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASS}@{FRIGATE_CAM_FRONT_IP}:554/h264Preview_01_sub
            roles:
            - detect
        objects:
          track:
          - person
          - car
          - dog
          - cat
        record:
          enabled: true
          events:
            retain:
              default: 14
          retain:
            days: 7
        snapshots:
          enabled: true
          retain:
            default: 14
    detectors:
      ov:
        device: AUTO
        model:
          path: /openvino-model/ssdlite_mobilenet_v2.xml
        type: openvino
    ffmpeg:
      hwaccel_args: preset-vaapi
    mqtt:
      enabled: true
      host: mosquitto.home.svc.cluster.local
      port: 1883
      topic_prefix: frigate
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/instance: frigate
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: frigate
  name: frigate
  namespace: home
