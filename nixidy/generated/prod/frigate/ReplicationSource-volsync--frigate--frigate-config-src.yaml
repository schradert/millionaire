apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: volsync--frigate--frigate-config-src
  namespace: home
spec:
  restic:
    copyMethod: Direct
    moverSecurityContext:
      fsGroup: 101
    pruneIntervalDays: 8
    repository: volsync--frigate--frigate-config
    retain:
      daily: 1
      monthly: 1
      weekly: 1
      yearly: 1
  sourcePVC: frigate-config
  trigger:
    schedule: 0 4 * * *
