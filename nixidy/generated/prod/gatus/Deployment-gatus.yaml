apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    secret.reloader.stakater.com/auto: "true"
  labels:
    app.kubernetes.io/instance: gatus
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: gatus
  name: gatus
  namespace: observability
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/instance: gatus
      app.kubernetes.io/name: gatus
  strategy:
    type: RollingUpdate
  template:
    metadata:
      annotations:
        checksum/config: e1fa5a087e9b21365d8350f6f21a0311ef7d381752e1bc550e53801053963b9a
      labels:
        app.kubernetes.io/instance: gatus
        app.kubernetes.io/name: gatus
    spec:
      automountServiceAccountToken: true
      containers:
        - envFrom:
            - configMapRef:
                name: gatus
            - secretRef:
                name: gatus
          image: twinproduction/gatus:v5.34.0
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /health
              port: http
          name: gatus
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
          resources: {}
          securityContext:
            readOnlyRootFilesystem: true
            runAsGroup: 65534
            runAsNonRoot: true
            runAsUser: 65534
          volumeMounts:
            - mountPath: /config
              name: gatus-config
              readOnly: true
      securityContext:
        fsGroup: 65534
      serviceAccountName: gatus
      volumes:
        - configMap:
            name: gatus
          name: gatus-config
