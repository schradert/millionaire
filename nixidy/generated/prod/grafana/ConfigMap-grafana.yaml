apiVersion: v1
data:
  GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
  GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
  GF_ANALYTICS_REPORTING_ENABLED: "false"
  GF_AUTH_ANONYMOUS_ENABLED: "false"
  GF_AUTH_BASIC_ENABLED: "false"
  GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /tmp/dashboards/home.json
  GF_DATE_FORMATS_USE_BROWSER_LOCALE: "true"
  GF_EXPLORE_ENABLED: "true"
  GF_FEATURE_TOGGLES_ENABLE: publicDashboards
  GF_LOG_MODE: console
  GF_NEWS_NEWS_FEED_ENABLED: "false"
  GF_SECURITY_COOKIE_SAMESITE: grafana
  GF_SERVER_ROOT_URL: https://grafana.trdos.me
  GF_SMTP_ENABLED: "true"
  GF_SMTP_FROM_ADDRESS: noreply@trdos.me
  GF_SMTP_FROM_NAME: Grafana
  GF_SMTP_HOST: stalwart.mail.svc.cluster.local:25
  grafana.ini: |
    [analytics]
    check_for_updates = true
    [log]
    mode = console
    [paths]
    data = /var/lib/grafana/
    logs = /var/log/grafana
    plugins = /var/lib/grafana/plugins
    provisioning = /etc/grafana/provisioning
    [server]
    domain = ''
    [unified_storage]
    index_path = /var/lib/grafana-search/bleve
kind: ConfigMap
metadata:
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app.kubernetes.io/instance: grafana
    app.kubernetes.io/name: grafana
  name: grafana
  namespace: observability
