apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: volsync--grafana--grafana-src
  namespace: observability
spec:
  restic:
    copyMethod: Direct
    moverSecurityContext:
      fsGroup: 472
    pruneIntervalDays: 8
    repository: volsync--grafana--grafana
    retain:
      daily: 1
      monthly: 1
      weekly: 1
      yearly: 1
  sourcePVC: grafana
  trigger:
    schedule: 0 4 * * *
