apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ha
  namespace: home
spec:
  backup:
    barmanObjectStore:
      destinationPath: s3://trdos-me--volsync/cnpg/ha/
      endpointURL: https://s3.us-west-004.backblazeb2.com
      s3Credentials:
        accessKeyId:
          key: ACCESS_KEY_ID
          name: ha-b2-postgres
        secretAccessKey:
          key: ACCESS_SECRET_KEY
          name: ha-b2-postgres
    retentionPolicy: 30d
  bootstrap:
    initdb:
      database: ha
      owner: ha
      postInitApplicationSQL: []
      postInitSQL: []
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  instances: 1
  monitoring:
    enablePodMonitor: true
  postgresql:
    shared_preload_libraries: []
  serviceAccountTemplate:
    metadata:
      name: ha-pg
  storage:
    size: 5Gi
    storageClass: ceph-block
