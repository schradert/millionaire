apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app.kubernetes.io/controller: ha
    app.kubernetes.io/instance: ha
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: ha
  name: ha
  namespace: home
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/controller: ha
      app.kubernetes.io/instance: ha
      app.kubernetes.io/name: ha
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        checksum/configMaps: c5e17bfccd2dd033a53baa3521c32a447360c5f16e3104f4fd31d8fe67bc2ab9
      labels:
        app.kubernetes.io/controller: ha
        app.kubernetes.io/instance: ha
        app.kubernetes.io/name: ha
    spec:
      automountServiceAccountToken: true
      containers:
        - envFrom:
            - secretRef:
                name: ha
          image: ghcr.io/home-assistant/home-assistant:2025.3
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 10
            tcpSocket:
              port: 8123
            timeoutSeconds: 1
          name: ha
          readinessProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 10
            tcpSocket:
              port: 8123
            timeoutSeconds: 1
          startupProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 10
            tcpSocket:
              port: 8123
            timeoutSeconds: 1
          volumeMounts:
            - mountPath: /config/configuration.yaml
              name: base-config
              subPath: configuration.yaml
            - mountPath: /config
              name: config
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      serviceAccountName: default
      volumes:
        - configMap:
            name: ha
          name: base-config
        - name: config
          persistentVolumeClaim:
            claimName: ha
