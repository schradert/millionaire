apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app.kubernetes.io/controller: ha
    app.kubernetes.io/instance: ha
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: ha
  name: ha
  namespace: home
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/controller: ha
      app.kubernetes.io/instance: ha
      app.kubernetes.io/name: ha
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        checksum/configMaps: 27a92feefd66e674832435e22b85640469b5965602a3b5a9c54103985df2680a
      labels:
        app.kubernetes.io/controller: ha
        app.kubernetes.io/instance: ha
        app.kubernetes.io/name: ha
    spec:
      automountServiceAccountToken: true
      containers:
        - envFrom:
            - secretRef:
                name: ha
          image: harbor.trdos.me/library/ha:2026.4.1@sha256:bf622d9eba0cc9bed8d3b0f710592c03bca7617ce55368c30e6d68eece530e3b
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 10
            tcpSocket:
              port: 8123
            timeoutSeconds: 1
          name: ha
          readinessProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 10
            tcpSocket:
              port: 8123
            timeoutSeconds: 1
          startupProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 10
            tcpSocket:
              port: 8123
            timeoutSeconds: 1
          volumeMounts:
            - mountPath: /config/configuration.yaml
              name: base-config
              subPath: configuration.yaml
            - mountPath: /config
              name: config
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      initContainers:
        - command:
            - sh
            - -c
            - |
              set -e

              # Symlink nix-managed custom components into PVC (same as NixOS module preStart)
              mkdir -p /config/custom_components
              # Remove stale nix store symlinks
              for link in /config/custom_components/*; do
                target=$(readlink "$link" 2>/dev/null || true)
                case "$target" in /nix/store/*) rm "$link" ;; esac
              done
              # Link current components
              for comp in /ha-extras/custom_components/*; do
                name=$(basename "$comp")
                ln -sfn "$comp" "/config/custom_components/$name"
              done

              # Symlink lovelace modules
              mkdir -p /config/www
              ln -sfn /ha-extras/www/nixos-lovelace-modules /config/www/nixos-lovelace-modules

              # Skip onboarding if already done
              [ -f /config/.storage/onboarding ] && exit 0

              # Create initial admin user via HA CLI
              hass --config /config --script auth add admin "$HASS_ADMIN_PASSWORD"

              # Mark onboarding as complete
              mkdir -p /config/.storage
              echo '{"data":{"done":["user","core_config","analytics","integration"]},"key":"onboarding","minor_version":1,"version":4}' > /config/.storage/onboarding

              echo "Home Assistant onboarded successfully"
          envFrom:
            - secretRef:
                name: ha
          image: harbor.trdos.me/library/ha:2026.4.1@sha256:bf622d9eba0cc9bed8d3b0f710592c03bca7617ce55368c30e6d68eece530e3b
          name: setup
          volumeMounts:
            - mountPath: /config
              name: config
      serviceAccountName: default
      volumes:
        - configMap:
            name: ha
          name: base-config
        - name: config
          persistentVolumeClaim:
            claimName: ha
