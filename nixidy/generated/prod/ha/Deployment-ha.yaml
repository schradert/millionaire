apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app.kubernetes.io/controller: ha
    app.kubernetes.io/instance: ha
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: ha
  name: ha
  namespace: home
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/controller: ha
      app.kubernetes.io/instance: ha
      app.kubernetes.io/name: ha
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        checksum/configMaps: 05898067bb96b62d19cc2466c54e2c81d4eb5195dc4614851578ca1488c1a2bb
      labels:
        app.kubernetes.io/controller: ha
        app.kubernetes.io/instance: ha
        app.kubernetes.io/name: ha
    spec:
      automountServiceAccountToken: true
      containers:
        - envFrom:
            - secretRef:
                name: ha
          image: harbor.trdos.me/library/ha:2026.4.1@sha256:365907aa555aac6bacc6a11902e95c54e435a83c31fc0eceff5614d24081767b
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 10
            tcpSocket:
              port: 8123
            timeoutSeconds: 1
          name: ha
          readinessProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 10
            tcpSocket:
              port: 8123
            timeoutSeconds: 1
          startupProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 10
            tcpSocket:
              port: 8123
            timeoutSeconds: 1
          volumeMounts:
            - mountPath: /config/configuration.yaml
              name: base-config
              subPath: configuration.yaml
            - mountPath: /config
              name: config
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      initContainers:
        - command:
            - sh
            - -c
            - |
              set -e
              # Skip if already onboarded
              [ -f /config/.storage/onboarding ] && exit 0

              # Create initial admin user via HA CLI
              python3 -m homeassistant.scripts.auth -c /config add admin "$HASS_ADMIN_PASSWORD"

              # Mark onboarding as complete
              mkdir -p /config/.storage
              echo '{"data":{"done":["user","core_config","analytics","integration"]},"key":"onboarding","minor_version":1,"version":4}' > /config/.storage/onboarding

              echo "Home Assistant onboarded successfully"
          envFrom:
            - secretRef:
                name: ha
          image: harbor.trdos.me/library/ha:2026.4.1@sha256:365907aa555aac6bacc6a11902e95c54e435a83c31fc0eceff5614d24081767b
          name: setup
          volumeMounts:
            - mountPath: /config
              name: config
      serviceAccountName: default
      volumes:
        - configMap:
            name: ha
          name: base-config
        - name: config
          persistentVolumeClaim:
            claimName: ha
