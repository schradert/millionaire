apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-jobservice
  namespace: cicd
spec:
  data:
    - remoteRef:
        key: harbor/jobservice/secret
      secretKey: secret
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: bitwarden
  target:
    template:
      data:
        JOBSERVICE_SECRET: '{{ .secret }}'
