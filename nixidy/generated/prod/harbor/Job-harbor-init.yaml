apiVersion: batch/v1
kind: Job
metadata:
  name: harbor-init
  namespace: cicd
spec:
  backoffLimit: 5
  template:
    spec:
      containers:
        - args:
            - |
              set -e
              ADMIN_PASS=$(cat /secrets/harbor/HARBOR_ADMIN_PASSWORD)
              AUTH="admin:$ADMIN_PASS"

              # --- Create/update robot account (before OIDC switch) ---
              ROBOT_SECRET=$(cat /secrets/robot/ROBOT_SECRET)
              ROBOT_NAME="push"

              EXISTING=$(curl -sf -u "$AUTH" "http://harbor.cicd.svc.cluster.local/api/v2.0/robots?q=name%3D$ROBOT_NAME" | grep -c '"id"' || true)
              if [ "$EXISTING" -eq 0 ]; then
                echo "Creating robot account '$ROBOT_NAME'..."
                echo '{"duration":-1,"level":"system","name":"push","permissions":[{"access":[{"action":"push","resource":"repository"},{"action":"pull","resource":"repository"},{"action":"create","resource":"tag"},{"action":"list","resource":"tag"}],"kind":"project","namespace":"*"}],"secret":"__ROBOT_SECRET__"}' | sed "s/__ROBOT_SECRET__/$ROBOT_SECRET/" | \
                  curl -sf -X POST -u "$AUTH" -H "Content-Type: application/json" -d @- "http://harbor.cicd.svc.cluster.local/api/v2.0/robots"
              fi

              # Always set the secret to match Bitwarden (Harbor ignores secret on create)
              ROBOT_ID=$(curl -sf -u "$AUTH" "http://harbor.cicd.svc.cluster.local/api/v2.0/robots?q=name%3D$ROBOT_NAME" | sed -n 's/.*"id":\([0-9]*\).*/\1/p' | head -1)
              echo "Setting robot secret (id=$ROBOT_ID)..."
              echo '{"secret":"__ROBOT_SECRET__"}' | sed "s/__ROBOT_SECRET__/$ROBOT_SECRET/" | \
                curl -sf -X PATCH -u "$AUTH" -H "Content-Type: application/json" -d @- "http://harbor.cicd.svc.cluster.local/api/v2.0/robots/$ROBOT_ID"
              echo "Robot account ready."

              # --- Configure OIDC ---
              CLIENT_SECRET=$(cat /secrets/oidc/OIDC_CLIENT_SECRET)
              echo "Configuring OIDC..."
              echo '{"auth_mode":"oidc_auth","oidc_admin_group":"/admin","oidc_auto_onboard":true,"oidc_client_id":"harbor","oidc_client_secret":"__OIDC_CLIENT_SECRET__","oidc_endpoint":"https://keycloak.trdos.me/realms/default","oidc_groups_claim":"groups","oidc_name":"Keycloak","oidc_scope":"openid,profile,email,groups","oidc_verify_cert":true}' | sed "s/__OIDC_CLIENT_SECRET__/$CLIENT_SECRET/" | \
                curl -sf -X PUT -u "$AUTH" -H "Content-Type: application/json" -d @- "http://harbor.cicd.svc.cluster.local/api/v2.0/configurations"
              echo "OIDC configured."

              # --- Configure library project (auto-scan + SBOM) ---
              echo "Configuring library project..."
              curl -sf -X PUT -u "$AUTH" -H "Content-Type: application/json" \
                -d '{"metadata":{"auto_sbom_generation":"true","auto_scan":"true","public":"true"}}' "http://harbor.cicd.svc.cluster.local/api/v2.0/projects/library"
              echo "Project configured."
          command:
            - sh
            - -c
          image: curlimages/curl:8.13.0
          name: init
          volumeMounts:
            - mountPath: /secrets/harbor
              name: harbor-secrets
              readOnly: true
            - mountPath: /secrets/oidc
              name: oidc-secrets
              readOnly: true
            - mountPath: /secrets/robot
              name: robot-secrets
              readOnly: true
      initContainers:
        - args:
            - |
              until curl -sf http://harbor.cicd.svc.cluster.local/api/v2.0/health; do
                echo "Waiting for Harbor..."
                sleep 10
              done
          command:
            - sh
            - -c
          image: curlimages/curl:8.13.0
          name: wait-for-harbor
      restartPolicy: OnFailure
      volumes:
        - name: harbor-secrets
          secret:
            secretName: harbor
        - name: oidc-secrets
          secret:
            secretName: harbor-oidc
        - name: robot-secrets
          secret:
            secretName: harbor-robot
