apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: hydra
  namespace: identity
spec:
  backup:
    barmanObjectStore:
      destinationPath: s3://trdos-me--volsync/cnpg/hydra/
      endpointURL: https://s3.us-west-004.backblazeb2.com
      s3Credentials:
        accessKeyId:
          key: ACCESS_KEY_ID
          name: hydra-b2-postgres
        secretAccessKey:
          key: ACCESS_SECRET_KEY
          name: hydra-b2-postgres
    retentionPolicy: 30d
  bootstrap:
    initdb:
      database: hydra
      owner: hydra
      postInitApplicationSQL: []
      postInitSQL: []
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  instances: 1
  monitoring:
    enablePodMonitor: true
  postgresql:
    shared_preload_libraries: []
  serviceAccountTemplate:
    metadata:
      name: hydra-pg
  storage:
    size: 5Gi
    storageClass: ceph-block
