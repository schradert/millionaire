apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: web
    app.kubernetes.io/instance: jitsi
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: jitsi-meet
  name: jitsi-jitsi-meet-web
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: web
      app.kubernetes.io/instance: jitsi
      app.kubernetes.io/name: jitsi-meet
  template:
    metadata:
      annotations:
        checksum/config: 4df5ca94ac31d907e3612e3f25ec646fd525957e72f33118f127a0591d6df9a4
      labels:
        app.kubernetes.io/component: web
        app.kubernetes.io/instance: jitsi
        app.kubernetes.io/name: jitsi-meet
    spec:
      containers:
        - envFrom:
            - configMapRef:
                name: jitsi-jitsi-meet-web
            - configMapRef:
                name: jitsi-prosody-common
          image: jitsi/web:web-1.0.9126-1@sha256:2092fd409c0c9ec7f9325d88df1c8e8ee092a26e98931ae3954d4dc02f07de41
          imagePullPolicy: Never
          livenessProbe:
            httpGet:
              path: /
              port: 80
          name: jitsi-meet
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
            - containerPort: 443
              name: https
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 80
          resources: {}
          securityContext: {}
          volumeMounts:
            - mountPath: /config
              name: config
      securityContext: {}
      serviceAccountName: jitsi-jitsi-meet
      volumes:
        - emptyDir: {}
          name: config
        - configMap:
            defaultMode: 493
            items:
              - key: 10-config
                path: 10-config
            name: jitsi-jitsi-meet-web-init
          name: custom-init
        - configMap:
            items:
              - key: custom-config.js
                path: custom-config.js
              - key: custom-interface_config.js
                path: custom-interface_config.js
              - key: default
                path: default
              - key: ffdhe2048.txt
                path: ffdhe2048.txt
              - key: interface_config.js
                path: interface_config.js
              - key: meet.conf
                path: meet.conf
              - key: nginx.conf
                path: nginx.conf
              - key: settings-config.js
                path: settings-config.js
              - key: ssl.conf
                path: ssl.conf
              - key: system-config.js
                path: system-config.js
            name: jitsi-jitsi-meet-web-conffiles
          name: custom-conffiles
