apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jitsi-web
  namespace: media
spec:
  hostnames:
    - jitsi.trdos.me
  parentRefs:
    - name: external
      namespace: kube-system
      sectionName: https
  rules:
    - backendRefs:
        - name: jitsi-jitsi-meet-web
          port: 80
