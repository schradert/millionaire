apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: keto
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: keto
  name: keto
  namespace: identity
spec:
  minReadySeconds: 0
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/instance: keto
      app.kubernetes.io/name: keto
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      annotations:
        checksum/keto-config: 41bdef2e1f01cac26cc6e9cb5dacb7297ede8dc83e10ca9ae1cb1c4d88cb1800
        checksum/keto-secrets: 6045e829424faed636f4f1642805503fcf20a6083cb8aef93cf4b91de2ee821f
      labels:
        app.kubernetes.io/instance: keto
        app.kubernetes.io/name: keto
    spec:
      automountServiceAccountToken: true
      containers:
        - args:
            - serve
            - --config
            - /etc/config/keto.yaml
          command:
            - keto
          env:
            - name: DSN
              valueFrom:
                secretKeyRef:
                  key: dsn
                  name: keto
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: db_password
                  name: keto
          image: oryd/keto:v25.4.0
          imagePullPolicy: IfNotPresent
          lifecycle: {}
          name: keto
          ports:
            - containerPort: 4466
              name: grpc-read
              protocol: TCP
            - containerPort: 4467
              name: grpc-write
              protocol: TCP
            - containerPort: 4468
              name: http-metrics
              protocol: TCP
          readinessProbe:
            failureThreshold: 5
            httpGet:
              httpHeaders:
                - name: Host
                  value: 127.0.0.1
              path: /health/alive
              port: 4467
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 65534
            runAsNonRoot: true
            runAsUser: 65534
            seLinuxOptions:
              level: s0:c123,c456
            seccompProfile:
              type: RuntimeDefault
          startupProbe:
            failureThreshold: 5
            httpGet:
              httpHeaders:
                - name: Host
                  value: 127.0.0.1
              path: /health/ready
              port: 4467
            initialDelaySeconds: 1
            periodSeconds: 1
            successThreshold: 1
            timeoutSeconds: 2
          volumeMounts:
            - mountPath: /etc/config
              name: keto-config-volume
              readOnly: true
      initContainers:
        - args:
            - migrate
            - up
            - -y
            - --config
            - /etc/config/keto.yaml
          command:
            - keto
          env:
            - name: DSN
              valueFrom:
                secretKeyRef:
                  key: dsn
                  name: keto
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: db_password
                  name: keto
          image: oryd/keto:v25.4.0
          imagePullPolicy: IfNotPresent
          name: keto-automigrate
          volumeMounts:
            - mountPath: /etc/config
              name: keto-config-volume
              readOnly: true
      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: keto
      terminationGracePeriodSeconds: 60
      volumes:
        - configMap:
            name: keto-config
          name: keto-config-volume
