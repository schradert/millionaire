apiVersion: keycloak.hostzero.com/v1beta1
kind: KeycloakClient
metadata:
  name: promptfoo
  namespace: identity
spec:
  definition:
    clientId: promptfoo
    defaultClientScopes:
      - openid
      - profile
      - email
    directAccessGrantsEnabled: false
    enabled: true
    name: Promptfoo Eval Dashboard
    protocol: openid-connect
    redirectUris:
      - https://promptfoo.trdos.me/*
    standardFlowEnabled: true
    webOrigins:
      - https://promptfoo.trdos.me
  realmRef:
    name: default
