apiVersion: v1
data:
  kratos.yaml: |
    cookies:
      domain: trdos.me
      same_site: Lax
    courier:
      smtp: {}
    identity:
      default_schema_id: default
      schemas:
      - id: default
        url: file:///etc/kratos/identity.schema.json
    selfservice:
      default_browser_return_url: https://login.trdos.me
      flows:
        error:
          ui_url: https://login.trdos.me/error
        login:
          lifespan: 1h
          ui_url: https://login.trdos.me/login
        logout:
          after:
            default_browser_return_url: https://login.trdos.me/login
        recovery:
          enabled: true
          ui_url: https://login.trdos.me/recovery
          use: code
        registration:
          after:
            password:
              hooks:
              - hook: session
          lifespan: 1h
          ui_url: https://login.trdos.me/registration
        settings:
          privileged_session_max_age: 15m
          required_aal: highest_available
          ui_url: https://login.trdos.me/settings
        verification:
          enabled: true
          ui_url: https://login.trdos.me/verification
          use: code
      methods:
        code:
          enabled: true
        link:
          enabled: true
        lookup_secret:
          enabled: true
        password:
          enabled: true
        totp:
          config:
            issuer: trdos.me
          enabled: true
        webauthn:
          config:
            passwordless: false
            rp:
              display_name: Millionaire Homelab
              id: trdos.me
              origins:
              - https://login.trdos.me
          enabled: true
    serve:
      admin:
        base_url: http://kratos-admin.identity.svc.cluster.local:4434
        port: 4434
      public:
        base_url: https://auth.trdos.me
        cors:
          allowed_origins:
          - https://login.trdos.me
          - https://admin.trdos.me
          - https://*.trdos.me
          enabled: true
        port: 4433
    session:
      cookie:
        domain: trdos.me
        same_site: Lax
      lifespan: 24h
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/instance: kratos
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: kratos
  name: kratos-config
  namespace: identity
