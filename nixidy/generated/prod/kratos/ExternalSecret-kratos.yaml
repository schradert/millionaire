apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kratos
  namespace: identity
spec:
  data:
    - remoteRef:
        key: ory/kratos/secret
      secretKey: cookie_secret
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: bitwarden
    - remoteRef:
        key: ory/kratos/cipher
      secretKey: cipher_secret
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: bitwarden
    - remoteRef:
        key: kratos-app
        property: password
      secretKey: db_password
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: kubernetes-identity
  target:
    template:
      data:
        cipher_secret: '{{ .cipher_secret }}'
        cookie_secret: '{{ .cookie_secret }}'
        db_password: '{{ .db_password }}'
        dsn: postgres://kratos:{{ .db_password }}@kratos-rw.identity.svc.cluster.local:5432/kratos?sslmode=disable
