apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app.kubernetes.io/controller: mainsail
    app.kubernetes.io/instance: mainsail
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mainsail
  name: mainsail
  namespace: printing
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/controller: mainsail
      app.kubernetes.io/instance: mainsail
      app.kubernetes.io/name: mainsail
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        checksum/configMaps: 689320c0dac84ae7e7774a917ad670d0de16ae3d86ee5d8e1927734e0df91bd2
      labels:
        app.kubernetes.io/controller: mainsail
        app.kubernetes.io/instance: mainsail
        app.kubernetes.io/name: mainsail
    spec:
      automountServiceAccountToken: false
      containers:
        - image: ghcr.io/mainsail-crew/mainsail:v2.13.1
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 10
            tcpSocket:
              port: 80
            timeoutSeconds: 1
          name: mainsail
          readinessProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 10
            tcpSocket:
              port: 80
            timeoutSeconds: 1
          startupProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 10
            tcpSocket:
              port: 80
            timeoutSeconds: 1
          volumeMounts:
            - mountPath: /usr/share/nginx/html/config.json
              name: config
              readOnly: true
              subPath: config.json
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      serviceAccountName: mainsail
      volumes:
        - configMap:
            name: mainsail-config
          name: config
