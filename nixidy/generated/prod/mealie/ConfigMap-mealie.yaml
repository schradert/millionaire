apiVersion: v1
data:
  ALLOW_PASSWORD_LOGIN: "False"
  ALLOW_SIGNUP: "False"
  BASE_URL: https://mealie.trdos.me
  DB_ENGINE: postgres
  OIDC_ADMIN_GROUP: /admin
  OIDC_AUTH_ENABLED: "True"
  OIDC_AUTO_REDIRECT: "True"
  OIDC_CLIENT_ID: mealie
  OIDC_CLIENT_SECRET_FILE: /secrets/client_secret
  OIDC_CONFIGURATION_URL: https://keycloak.trdos.me/realms/default/.well-known/openid-configuration
  OIDC_PROVIDER_NAME: Keycloak
  OIDC_REMEMBER_ME: "True"
  OIDC_SIGNUP_ENABLED: "True"
  OIDC_USER_GROUP: /family
  POSTGRES_PASSWORD_FILE: /secrets/db_password.txt
  POSTGRES_SERVER: mealie-rw
  SMTP_AUTH_STRATEGY: NONE
  SMTP_FROM_EMAIL: noreply@trdos.me
  SMTP_FROM_NAME: Mealie
  SMTP_HOST: stalwart.mail.svc.cluster.local
  SMTP_PORT: "25"
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/instance: mealie
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mealie
  name: mealie
  namespace: health
