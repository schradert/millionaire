apiVersion: v1
data:
  default.conf: "server {\n  listen 8080 default_server;\n  server_name _;\n  location /healthz { return 200 \"ok\"; }\n  location / { return 404; }\n}\n\nserver {\n  listen 8080;\n  server_name actual.trdos.me;\n  location / {\n    proxy_pass http://actual.finance.svc.cluster.local:5006;\n    proxy_set_header Host $host;\n    proxy_set_header X-Real-IP $remote_addr;\n    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n    proxy_set_header X-Forwarded-Proto https;\n    proxy_http_version 1.1;\n    \n  }\n}\n\nserver {\n  listen 8080;\n  server_name adguard.trdos.me;\n  location / {\n    proxy_pass http://adguard.kube-system.svc.cluster.local:3000;\n    proxy_set_header Host $host;\n    proxy_set_header X-Real-IP $remote_addr;\n    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n    proxy_set_header X-Forwarded-Proto https;\n    proxy_http_version 1.1;\n    \n  }\n}\n\nserver {\n  listen 8080;\n  server_name firefly.trdos.me;\n  location / {\n    proxy_pass http://firefly.finance.svc.cluster.local:8080;\n    proxy_set_header Host $host;\n    proxy_set_header X-Real-IP $remote_addr;\n    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n    proxy_set_header X-Forwarded-Proto https;\n    proxy_http_version 1.1;\n    \n  }\n}\n\nserver {\n  listen 8080;\n  server_name hass.trdos.me;\n  location / {\n    proxy_pass http://ha.home.svc.cluster.local:8123;\n    proxy_set_header Host $host;\n    proxy_set_header X-Real-IP $remote_addr;\n    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n    proxy_set_header X-Forwarded-Proto https;\n    proxy_http_version 1.1;\n    proxy_set_header Upgrade $http_upgrade;\nproxy_set_header Connection \"upgrade\";\n\n  }\n}\n"
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/instance: oauth2-proxy
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: oauth2-proxy
  name: oauth2-proxy
  namespace: identity
