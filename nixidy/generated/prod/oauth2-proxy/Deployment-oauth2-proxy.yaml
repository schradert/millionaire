apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app.kubernetes.io/controller: oauth2-proxy
    app.kubernetes.io/instance: oauth2-proxy
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: oauth2-proxy
  name: oauth2-proxy
  namespace: identity
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/controller: oauth2-proxy
      app.kubernetes.io/instance: oauth2-proxy
      app.kubernetes.io/name: oauth2-proxy
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: oauth2-proxy
        app.kubernetes.io/instance: oauth2-proxy
        app.kubernetes.io/name: oauth2-proxy
    spec:
      automountServiceAccountToken: true
      containers:
        - args:
            - --http-address=0.0.0.0:4180
            - --provider=keycloak-oidc
            - --oidc-issuer-url=https://keycloak.trdos.me/realms/default
            - --client-id=oauth2-proxy
            - --redirect-url=https://oauth2.trdos.me/oauth2/callback
            - --cookie-domain=.trdos.me
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --cookie-name=_oauth2_proxy
            - --email-domain=*
            - --set-xauthrequest=true
            - --pass-access-token=true
            - --upstream=static://202
            - --skip-provider-button=true
            - --reverse-proxy=true
            - --whitelist-domain=.trdos.me
          envFrom:
            - secretRef:
                name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.1
          livenessProbe:
            httpGet:
              path: /ping
              port: http
          name: oauth2-proxy
          ports:
            - containerPort: 4180
              name: http
          readinessProbe:
            httpGet:
              path: /ready
              port: http
          startupProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 10
            tcpSocket:
              port: 4180
            timeoutSeconds: 1
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      serviceAccountName: default
