apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/controller: openviking
    app.kubernetes.io/instance: openviking
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: openviking
  name: openviking
  namespace: ai
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/controller: openviking
      app.kubernetes.io/instance: openviking
      app.kubernetes.io/name: openviking
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: openviking
        app.kubernetes.io/instance: openviking
        app.kubernetes.io/name: openviking
    spec:
      automountServiceAccountToken: true
      containers:
        - env:
            - name: VIKING_PORT
              value: "8080"
          image: ghcr.io/volcengine/openviking:latest
          livenessProbe:
            httpGet:
              path: /health
              port: http
          name: openviking
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          startupProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 10
            tcpSocket:
              port: 8080
            timeoutSeconds: 1
          volumeMounts:
            - mountPath: /data
              name: data
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      serviceAccountName: default
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openviking
