apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  labels:
    app: kube-prometheus-stack-admission-create
    app.kubernetes.io/component: prometheus-operator-webhook
    app.kubernetes.io/instance: prometheus
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: kube-prometheus-stack-prometheus-operator
    app.kubernetes.io/part-of: kube-prometheus-stack
    chart: kube-prometheus-stack-82.10.5
    heritage: Helm
    release: prometheus
  name: prometheus-kube-prometheus-admission-create
  namespace: observability
spec:
  template:
    metadata:
      labels:
        app: kube-prometheus-stack-admission-create
        app.kubernetes.io/component: prometheus-operator-webhook
        app.kubernetes.io/instance: prometheus
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: kube-prometheus-stack-prometheus-operator
        app.kubernetes.io/part-of: kube-prometheus-stack
        chart: kube-prometheus-stack-82.10.5
        heritage: Helm
        release: prometheus
      name: prometheus-kube-prometheus-admission-create
    spec:
      containers:
        - args:
            - create
            - --host=prometheus-kube-prometheus-operator,prometheus-kube-prometheus-operator.observability.svc,prometheus-kube-prometheus-operator-webhook,prometheus-kube-prometheus-operator-webhook.observability.svc
            - --namespace=observability
            - --secret-name=prometheus-kube-prometheus-admission
          image: ghcr.io/jkroepke/kube-webhook-certgen:1.7.8
          imagePullPolicy: IfNotPresent
          name: create
          resources: {}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      restartPolicy: OnFailure
      securityContext:
        runAsGroup: 2000
        runAsNonRoot: true
        runAsUser: 2000
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: prometheus-kube-prometheus-admission
  ttlSecondsAfterFinished: 60
