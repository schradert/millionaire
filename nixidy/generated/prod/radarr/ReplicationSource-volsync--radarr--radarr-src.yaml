apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: volsync--radarr--radarr-src
  namespace: media
spec:
  restic:
    copyMethod: Direct
    moverSecurityContext:
      fsGroup: 101
    pruneIntervalDays: 8
    repository: volsync--radarr--radarr
    retain:
      daily: 1
      monthly: 1
      weekly: 1
      yearly: 1
  sourcePVC: radarr
  trigger:
    schedule: 0 4 * * *
