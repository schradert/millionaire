apiVersion: batch/v1
kind: CronJob
metadata:
  labels:
    app.kubernetes.io/controller: recyclarr
    app.kubernetes.io/instance: recyclarr
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: recyclarr
  name: recyclarr
  namespace: media
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 6
      template:
        metadata:
          annotations:
            checksum/configMaps: 56ddd3740979b849ba765dbe9164c7847950165a42e2ed7349099a68a30176a5
          labels:
            app.kubernetes.io/controller: recyclarr
            app.kubernetes.io/instance: recyclarr
            app.kubernetes.io/name: recyclarr
        spec:
          automountServiceAccountToken: true
          containers:
            - args:
                - sync
              envFrom:
                - secretRef:
                    name: recyclarr
              image: ghcr.io/recyclarr/recyclarr:8.5.1@sha256:734cecf44ae9be7cf0cb05b2c1bc7da0abef9d938cc11b605e58b3146205e5c0
              name: recyclarr
              volumeMounts:
                - mountPath: /config
                  name: config
                - mountPath: /config/recyclarr.yml
                  name: config-file
                  readOnly: true
                  subPath: recyclarr.yml
                - mountPath: /config/logs
                  name: tmpfs
                  subPath: logs
                - mountPath: /config/repositories
                  name: tmpfs
                  subPath: repositories
                - mountPath: /tmp
                  name: tmpfs
                  subPath: tmp
          dnsPolicy: ClusterFirst
          enableServiceLinks: false
          hostIPC: false
          hostNetwork: false
          hostPID: false
          restartPolicy: Never
          serviceAccountName: default
          volumes:
            - name: config
              persistentVolumeClaim:
                claimName: recyclarr
            - configMap:
                name: recyclarr
              name: config-file
            - emptyDir: {}
              name: tmpfs
  schedule: '@daily'
  startingDeadlineSeconds: 30
  successfulJobsHistoryLimit: 1
  suspend: false
