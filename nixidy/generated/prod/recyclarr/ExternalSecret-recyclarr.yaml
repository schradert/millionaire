apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: recyclarr
  namespace: media
spec:
  data:
    - remoteRef:
        key: radarr
      secretKey: radarr
    - remoteRef:
        key: sonarr
      secretKey: sonarr
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  target:
    template:
      data:
        secrets.yml: |
          radarr: '{{ .radarr }}'
          sonarr: '{{ .sonarr }}'
