apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app.kubernetes.io/controller: siyuan
    app.kubernetes.io/instance: siyuan
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: siyuan
  name: siyuan
  namespace: home
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/controller: siyuan
      app.kubernetes.io/instance: siyuan
      app.kubernetes.io/name: siyuan
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: siyuan
        app.kubernetes.io/instance: siyuan
        app.kubernetes.io/name: siyuan
    spec:
      automountServiceAccountToken: false
      containers:
        - env:
            - name: SIYUAN_ACCESS_AUTH_CODE_BYPASS
              value: "true"
            - name: TZ
              value: America/Los_Angeles
          image: b3log/siyuan:v3.6.1@sha256:e14f3958fa9d7be867053b0e681f97ad4ec2e410c275b67670690083f81f05db
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 10
            tcpSocket:
              port: 6806
            timeoutSeconds: 1
          name: siyuan
          readinessProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 10
            tcpSocket:
              port: 6806
            timeoutSeconds: 1
          securityContext:
            runAsGroup: 1000
            runAsUser: 1000
          startupProbe:
            failureThreshold: 30
            initialDelaySeconds: 0
            periodSeconds: 10
            tcpSocket:
              port: 6806
            timeoutSeconds: 1
          volumeMounts:
            - mountPath: /siyuan/workspace
              name: workspace
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      serviceAccountName: siyuan
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: siyuan
