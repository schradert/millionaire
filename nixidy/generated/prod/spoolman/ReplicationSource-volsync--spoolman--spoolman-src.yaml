apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: volsync--spoolman--spoolman-src
  namespace: printing
spec:
  restic:
    copyMethod: Direct
    moverSecurityContext:
      fsGroup: 101
    pruneIntervalDays: 8
    repository: volsync--spoolman--spoolman
    retain:
      daily: 1
      monthly: 1
      weekly: 1
      yearly: 1
  sourcePVC: spoolman
  trigger:
    schedule: 0 4 * * *
