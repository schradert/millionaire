apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: volsync--syncthing--syncthing-src
  namespace: home
spec:
  restic:
    copyMethod: Direct
    moverSecurityContext:
      fsGroup: 101
    pruneIntervalDays: 8
    repository: volsync--syncthing--syncthing
    retain:
      daily: 1
      monthly: 1
      weekly: 1
      yearly: 1
  sourcePVC: syncthing-state
  trigger:
    schedule: 0 4 * * *
