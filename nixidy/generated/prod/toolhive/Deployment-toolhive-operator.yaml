apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: toolhive
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: toolhive-operator
    app.kubernetes.io/part-of: toolhive-operator
  name: toolhive-operator
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: toolhive
      app.kubernetes.io/name: toolhive-operator
      app.kubernetes.io/part-of: toolhive-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: toolhive
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: toolhive-operator
        app.kubernetes.io/part-of: toolhive-operator
    spec:
      containers:
        - args:
            - --leader-elect
          env:
            - name: GOMEMLIMIT
              value: 150MiB
            - name: GOGC
              value: "75"
            - name: UNSTRUCTURED_LOGS
              value: "false"
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: TOOLHIVE_USE_CONFIGMAP
              value: "true"
            - name: ENABLE_EXPERIMENTAL_FEATURES
              value: "false"
            - name: TOOLHIVE_RUNNER_IMAGE
              value: ghcr.io/stacklok/toolhive/proxyrunner:v0.6.9
            - name: VMCP_IMAGE
              value: ghcr.io/stacklok/toolhive/vmcp:v0.6.9
            - name: TOOLHIVE_PROXY_HOST
              value: 0.0.0.0
            - name: TOOLHIVE_REGISTRY_API_IMAGE
              value: ghcr.io/stacklok/thv-registry-api:v0.3.1
          image: ghcr.io/stacklok/toolhive/operator:v0.6.9
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          name: manager
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
            - containerPort: 8081
              name: health
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
      securityContext:
        runAsNonRoot: true
      serviceAccountName: toolhive-operator
      terminationGracePeriodSeconds: 10
