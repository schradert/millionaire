apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: volsync
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: volsync
    control-plane: volsync-controller
  name: volsync
  namespace: storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: volsync
      app.kubernetes.io/name: volsync
      control-plane: volsync-controller
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/instance: volsync
        app.kubernetes.io/name: volsync
        control-plane: volsync-controller
    spec:
      containers:
        - args:
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8443
            - --leader-elect
            - --rclone-container-image=quay.io/backube/volsync:0.15.0
            - --restic-container-image=quay.io/backube/volsync:0.15.0
            - --rsync-container-image=quay.io/backube/volsync:0.15.0
            - --rsync-tls-container-image=quay.io/backube/volsync:0.15.0
            - --syncthing-container-image=quay.io/backube/volsync:0.15.0
            - --scc-name=volsync-privileged-mover
          command:
            - /manager
          env:
            - name: VOLSYNC_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          image: quay.io/backube/volsync:0.15.0
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          name: manager
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /tmp
              name: tempdir
      securityContext:
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: volsync
      terminationGracePeriodSeconds: 10
      volumes:
        - emptyDir:
            medium: Memory
          name: tempdir
