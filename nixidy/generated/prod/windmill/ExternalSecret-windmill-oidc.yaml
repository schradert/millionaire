apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: windmill-oidc
  namespace: development
spec:
  data:
    - remoteRef:
        key: windmill
        property: CLIENT_ID
      secretKey: clientId
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: kubernetes-identity
    - remoteRef:
        key: windmill
        property: CLIENT_SECRET
      secretKey: clientSecret
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: kubernetes-identity
  target:
    template:
      data:
        CLIENT_ID: '{{ .clientId }}'
        CLIENT_SECRET: '{{ .clientSecret }}'
