apiVersion: batch/v1
kind: Job
metadata:
  name: windmill-oidc-config
  namespace: development
spec:
  backoffLimit: 5
  template:
    spec:
      containers:
        - args:
            - |
              ADMIN_PASS=$(cat /secrets/admin/password)
              CLIENT_ID=$(cat /secrets/oidc/CLIENT_ID)
              CLIENT_SECRET=$(cat /secrets/oidc/CLIENT_SECRET)

              # Initial login with default credentials to get bootstrap token
              TOKEN=$(curl -sf -X POST \
                -H "Content-Type: application/json" \
                -d "{\"email\":\"admin@windmill.dev\",\"password\":\"changeme\"}" \
                "http://windmill-app.development.svc.cluster.local:8000/api/auth/login")

              # Update admin password
              curl -sf -X POST \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer $TOKEN" \
                -d "{\"password\":\"$ADMIN_PASS\"}" \
                "http://windmill-app.development.svc.cluster.local:8000/api/users/setpassword" || true

              # Re-login with new password
              TOKEN=$(curl -sf -X POST \
                -H "Content-Type: application/json" \
                -d "{\"email\":\"admin@windmill.dev\",\"password\":\"$ADMIN_PASS\"}" \
                "http://windmill-app.development.svc.cluster.local:8000/api/auth/login")

              # Configure Keycloak OIDC SSO
              curl -sf -X POST \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer $TOKEN" \
                -d "{
                  \"value\": {
                    \"keycloak\": {
                      \"id\": \"$CLIENT_ID\",
                      \"secret\": \"$CLIENT_SECRET\",
                      \"login_config\": {
                        \"auth_url\": \"https://keycloak.trdos.me/realms/default/protocol/openid-connect/auth\",
                        \"token_url\": \"https://keycloak.trdos.me/realms/default/protocol/openid-connect/token\",
                        \"userinfo_url\": \"https://keycloak.trdos.me/realms/default/protocol/openid-connect/userinfo\",
                        \"scopes\": [\"openid\", \"profile\", \"email\", \"offline_access\"]
                      }
                    }
                  }
                }" \
                "http://windmill-app.development.svc.cluster.local:8000/api/settings/global/oauths"
          command:
            - sh
            - -c
          image: curlimages/curl:8.13.0
          name: configure-oidc
          volumeMounts:
            - mountPath: /secrets/admin
              name: admin-secrets
              readOnly: true
            - mountPath: /secrets/oidc
              name: oidc-secrets
              readOnly: true
      initContainers:
        - args:
            - |
              until curl -sf http://windmill-app.development.svc.cluster.local:8000/api/version; do
                echo "Waiting for Windmill..."
                sleep 10
              done
          command:
            - sh
            - -c
          image: curlimages/curl:8.13.0
          name: wait-for-windmill
      restartPolicy: OnFailure
      volumes:
        - name: admin-secrets
          secret:
            secretName: windmill-admin
        - name: oidc-secrets
          secret:
            secretName: windmill-oidc
