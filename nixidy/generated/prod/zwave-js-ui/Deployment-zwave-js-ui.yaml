apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    reloader.stakater.com/auto: "true"
  labels:
    app.kubernetes.io/controller: zwave-js-ui
    app.kubernetes.io/instance: zwave-js-ui
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: zwave-js-ui
  name: zwave-js-ui
  namespace: home
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/controller: zwave-js-ui
      app.kubernetes.io/instance: zwave-js-ui
      app.kubernetes.io/name: zwave-js-ui
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: zwave-js-ui
        app.kubernetes.io/instance: zwave-js-ui
        app.kubernetes.io/name: zwave-js-ui
    spec:
      automountServiceAccountToken: true
      containers:
        - image: zwavejs/zwave-js-ui:9.31.0
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 10
            tcpSocket:
              port: 8091
            timeoutSeconds: 1
          name: zwave-js-ui
          readinessProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 10
            tcpSocket:
              port: 8091
            timeoutSeconds: 1
          securityContext:
            privileged: true
          startupProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 10
            tcpSocket:
              port: 8091
            timeoutSeconds: 1
          volumeMounts:
            - mountPath: /usr/src/app/store
              name: store
            - mountPath: /dev/serial/by-id/usb-Nabu_Casa_ZWA-2_1CDBD4AEBC68-if00
              name: usb
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      nodeSelector:
        kubernetes.io/hostname: sirver
      serviceAccountName: default
      volumes:
        - name: store
          persistentVolumeClaim:
            claimName: zwave-js-ui
        - hostPath:
            path: /dev/serial/by-id/usb-Nabu_Casa_ZWA-2_1CDBD4AEBC68-if00
          name: usb
