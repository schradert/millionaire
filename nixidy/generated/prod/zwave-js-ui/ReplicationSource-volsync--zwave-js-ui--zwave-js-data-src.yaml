apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: volsync--zwave-js-ui--zwave-js-data-src
  namespace: home
spec:
  restic:
    copyMethod: Direct
    moverSecurityContext:
      fsGroup: 101
    pruneIntervalDays: 8
    repository: volsync--zwave-js-ui--zwave-js-data
    retain:
      daily: 1
      monthly: 1
      weekly: 1
      yearly: 1
  sourcePVC: zwave-js-data
  trigger:
    schedule: 0 4 * * *
